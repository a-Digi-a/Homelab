services:
  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Dublin
      - JELLYFIN_PublishedServerUrl=https://jellyfin.digi-a.org #optional
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,video,utility
    volumes:
      - ~/data/jellyfin/config:/config
      - ~/data/jellyfin/tvshows/:/data/tvshows
      - ~/data/jellyfin/movies/:/data/movies
      - ~/data/jellyfin/anime/:/data/anime
    ports:
      - 8096:8096
    group_add:
      - "105"
    restart: unless-stopped

    devices:
      - /dev/dri/renderD129:/dev/dri/renderD129
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.jellyfin.entrypoints=https"
      - "traefik.http.routers.jellyfin.rule=Host(`jellyfin.digi-a.org`)"
    networks:
        - proxy
networks:
  proxy:
    external: true
