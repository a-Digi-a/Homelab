services:
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
    volumes:
      - ~/data/sonarr/config:/config
      - ~/data/jellyfin/tvshows/:/tv #optional
      - ~/data/jellyfin/anime:/anime #optional
      - ~/data/qbittorrent/downloads:/downloads #optional
    ports:
      - 8989:8989
    restart: unless-stopped

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.sonarr.entrypoints=https"
      - "traefik.http.routers.sonarr.rule=Host(`sonarr.digi-a.org`)"
    networks:
        - proxy
networks:
  proxy:
    external: true
