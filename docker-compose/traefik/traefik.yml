api:
  dashboard: true

log:
  format: json
  level: DEBUG

entryPoints:

  http:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: "https"
          scheme: "https"
          permanent: true

  https:
    address: ":443"
    http:
      tls:
        certresolver: cloudflare
        domains:
          - main: "digi-a.org"
            sans: "*.digi-a.org"
          - main: "local.digi-a.org"
            sans: "*.local.digi-a.org"

certificatesResolvers:
  cloudflare:
    acme:
      storage: "acme.json"
      dnsChallenge:
        provider: "cloudflare"
        delayBeforeCheck: 90
        disablePropagationCheck: true
        resolvers:
          - "1.1.1.1:53"
          - "1.0.0.1:53"

providers:
  docker:
    watch: true
    network: "proxy"
    exposedByDefault: false
    endpoint: "unix:///var/run/docker.sock"

