services:
  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Dublin
    volumes:
      - ~/data/bazarr/config:/config
      - ~/data/jellyfin/movies:/movies 
      - ~/data/jellyfin/tvshows:/tv 
      - ~/data/jellyfin/anime:/anime
    ports:
      - 6767:6767
    restart: unless-stopped

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.bazarr.entrypoints=https"
      - "traefik.http.routers.bazarr.rule=Host(`bazarr.local.digi-a.org`)"
      - "traefik.http.services.bazarr.loadbalancer.server.port=6767"
    networks:
        - proxy
networks:
  proxy:
    external: true
